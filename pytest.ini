[pytest]
# Pytest configuration for AWorld

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Ignore patterns - exclude experimental/optional dependency tests
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .aworld
    Claude-Sessions
    tests/a2a
    tests/train

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -v

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_llm: marks tests that require LLM API keys
    requires_torch: marks tests that require torch
    requires_a2a: marks tests that require a2a package

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=aworld --cov-report=html --cov-report=term

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread
